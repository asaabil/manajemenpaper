server {
  listen 80;

  # Set the root directory for serving files
  root /usr/share/nginx/html;

  # Specify the default file to serve
  index index.html index.htm;

  # Handle routing for Single Page Applications (SPA)
  # If a file is not found, fall back to index.html
  location / {
    try_files $uri /index.html;
  }

  # You can add a location block for your API to proxy requests
  # to the backend container. This will be handled by docker-compose,
  # but this is how you would do it with nginx.
  # location /api {
  #   proxy_pass http://backend:5000;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection 'upgrade';
  #   proxy_set_header Host $host;
  #   proxy_cache_bypass $http_upgrade;
  # }
}
